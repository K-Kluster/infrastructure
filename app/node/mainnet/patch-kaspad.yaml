apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kaspad
  namespace: kaspa
spec:
  serviceName: prod-kaspad
  selector:
    matchLabels:
      app: prod-kaspad
  template:
    metadata:
      labels:
        app: prod-kaspad
    spec:
      $patch: replace
      terminationGracePeriodSeconds: 30
      containers:
        - name: kaspad
          image: supertypo/rusty-kaspad:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: RUST_BACKTRACE
              value: "1"
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          args:
            - kaspad
            - --yes
            - --nologfiles
            - --disable-upnp
            - --utxoindex
            - --rpclisten=0.0.0.0:16110
            - --rpclisten-borsh=0.0.0.0:17110
            - --rpclisten-json=0.0.0.0:18112
            - --externalip=$(NODE_IP)
          volumeMounts:
            - name: data
              mountPath: /app/data
          readinessProbe:
            tcpSocket:
              port: 16110
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 16110
            initialDelaySeconds: 30
            periodSeconds: 20
          startupProbe:
            tcpSocket:
              port: 16110
            periodSeconds: 10
            failureThreshold: 60
          resources:
            limits:
              cpu: "4"
              memory: 16Gi
            requests:
              cpu: "3"
              memory: 8Gi
          ports:
            - name: rpc
              containerPort: 16110
              protocol: TCP
            - name: wrpc-borsh
              containerPort: 17110
              protocol: TCP
            - name: wrpc-json
              containerPort: 18112
              protocol: TCP
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 350Gi
---
apiVersion: v1
kind: Service
metadata:
  name: kaspad
  namespace: kaspa
  labels:
    app: prod-kaspad
spec:
  $patch: replace
  clusterIP: None
  selector:
    app: prod-kaspad
  ports:
    - name: rpc
      port: 16110
      targetPort: rpc
      protocol: TCP
    - name: wrpc-borsh
      port: 17110
      targetPort: 17110
      protocol: TCP
    - name: wrpc-json
      port: 18112
      targetPort: 18112
      protocol: TCP
