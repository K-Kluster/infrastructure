apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kaspad
  namespace: kaspa
spec:
  serviceName: devnet-kaspad
  selector:
    matchLabels:
      app: devnet-kaspad
  template:
    metadata:
      labels:
        app: devnet-kaspad
    spec:
      containers:
        - name: kaspad
          image: kkluster/rusty-kaspa@kip21
          args:
            - kaspad
            - --yes
            - --nologfiles
            - --disable-upnp
            - --devnet
            - --enable-unsynced-mining
            - --utxoindex
            - --rpclisten=0.0.0.0:16610
            - --rpclisten-borsh=0.0.0.0:17610
            - --rpclisten-json=0.0.0.0:18610
            - --externalip=$(NODE_IP):16611
            - --override-params-file=/app/override/params.json
          ports:
            - name: grpc
              containerPort: 16610
              protocol: TCP
            - name: rpc
              containerPort: 16611
              protocol: TCP
            - name: wrpc-borsh
              containerPort: 17610
              protocol: TCP
            - name: wrpc-json
              containerPort: 18610
              protocol: TCP
          volumeMounts:
            - name: override-params
              mountPath: /app/override/params.json
              subPath: params.json
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 16610
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 16610
            initialDelaySeconds: 30
            periodSeconds: 20
          startupProbe:
            tcpSocket:
              port: 16610
            periodSeconds: 10
            failureThreshold: 60
      volumes:
        - name: override-params
          configMap:
            name: kaspad-override-params
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 200Gi
---
apiVersion: v1
kind: Service
metadata:
  name: kaspad
  namespace: kaspa
  labels:
    app: devnet-kaspad
spec:
  $patch: replace
  clusterIP: None
  selector:
    app: devnet-kaspad
  ports:
    - name: grpc
      port: 16610
      targetPort: grpc
      protocol: TCP
    - name: rpc
      port: 16611
      targetPort: rpc
      protocol: TCP
    - name: wrpc-borsh
      port: 17610
      targetPort: wrpc-borsh
      protocol: TCP
    - name: wrpc-json
      port: 18610
      targetPort: wrpc-json
      protocol: TCP
