apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-pod-io
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  kaspa-pod-io.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_fs_reads_total{namespace=\"$namespace\",pod=~\"$pod\",container!=\"\",container!=\"POD\"}[5m]))",
              "legendFormat": "{{ pod }}",
              "refId": "A"
            }
          ],
          "title": "Filesystem Reads/s",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 2,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_fs_writes_total{namespace=\"$namespace\",pod=~\"$pod\",container!=\"\",container!=\"POD\"}[5m]))",
              "legendFormat": "{{ pod }}",
              "refId": "A"
            }
          ],
          "title": "Filesystem Writes/s",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "id": 3,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_blkio_device_usage_total{namespace=\"$namespace\",pod=~\"$pod\",container!=\"\",container!=\"POD\",operation=\"Read\"}[5m]))",
              "legendFormat": "{{ pod }}",
              "refId": "A"
            }
          ],
          "title": "Block Read Throughput",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "id": 4,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_blkio_device_usage_total{namespace=\"$namespace\",pod=~\"$pod\",container!=\"\",container!=\"POD\",operation=\"Write\"}[5m]))",
              "legendFormat": "{{ pod }}",
              "refId": "A"
            }
          ],
          "title": "Block Write Throughput",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 16
          },
          "id": 5,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "targets": [
            {
              "expr": "sum by (pod) (container_fs_usage_bytes{namespace=\"$namespace\",pod=~\"$pod\",container!=\"\",container!=\"POD\"})",
              "legendFormat": "{{ pod }}",
              "refId": "A"
            }
          ],
          "title": "Filesystem Usage",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 16
          },
          "id": 6,
          "options": {
            "displayMode": "gradient",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showUnfilled": true
          },
          "targets": [
            {
              "expr": "topk(10, sum by (pod) (rate(container_blkio_device_usage_total{namespace=\"$namespace\",container!=\"\",container!=\"POD\",operation=\"Write\"}[5m])))",
              "legendFormat": "{{ pod }}",
              "refId": "A"
            }
          ],
          "title": "Hot Pods by Write Throughput",
          "type": "bargauge"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 41,
      "style": "dark",
      "tags": [
        "kaspa",
        "kubernetes",
        "pod-io"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "selected": true,
              "text": "kaspa",
              "value": "kaspa"
            },
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "definition": "label_values(kube_pod_info, namespace)",
            "label": "Namespace",
            "name": "namespace",
            "options": [],
            "query": {
              "query": "label_values(kube_pod_info, namespace)",
              "refId": "Prometheus-namespace"
            },
            "refresh": 1,
            "type": "query"
          },
          {
            "allValue": ".*",
            "current": {
              "selected": true,
              "text": "All",
              "value": "$__all"
            },
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "definition": "label_values(kube_pod_info{namespace=\"$namespace\"}, pod)",
            "includeAll": true,
            "label": "Pod",
            "multi": true,
            "name": "pod",
            "options": [],
            "query": {
              "query": "label_values(kube_pod_info{namespace=\"$namespace\"}, pod)",
              "refId": "Prometheus-pod"
            },
            "refresh": 1,
            "type": "query"
          }
        ]
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "title": "Kaspa Pod I/O",
      "uid": "kaspa-pod-io",
      "version": 1
    }
