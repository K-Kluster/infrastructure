apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-longhorn
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  kaspa-longhorn.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "expr": "longhorn_volume_capacity_bytes{pvc_namespace=\"$namespace\",pvc=\"$pvc\"}",
              "legendFormat": "Capacity",
              "refId": "A"
            }
          ],
          "title": "Capacity",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "expr": "longhorn_volume_actual_size_bytes{pvc_namespace=\"$namespace\",pvc=\"$pvc\"}",
              "legendFormat": "Used",
              "refId": "A"
            }
          ],
          "title": "Used",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 0.7
                  },
                  {
                    "color": "red",
                    "value": 0.9
                  }
                ]
              },
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 12,
            "y": 0
          },
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "expr": "longhorn_volume_actual_size_bytes{pvc_namespace=\"$namespace\",pvc=\"$pvc\"} / longhorn_volume_capacity_bytes{pvc_namespace=\"$namespace\",pvc=\"$pvc\"}",
              "legendFormat": "Used %",
              "refId": "A"
            }
          ],
          "title": "Used %",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "options": {
                    "1": {
                      "text": "Healthy"
                    },
                    "2": {
                      "text": "Degraded"
                    },
                    "3": {
                      "text": "Faulted"
                    }
                  },
                  "type": "value"
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 2
                  },
                  {
                    "color": "red",
                    "value": 3
                  }
                ]
              },
              "unit": "none"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 18,
            "y": 0
          },
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "expr": "longhorn_volume_robustness{pvc_namespace=\"$namespace\",pvc=\"$pvc\"}",
              "legendFormat": "Robustness",
              "refId": "A"
            }
          ],
          "title": "Robustness",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 5
          },
          "id": 5,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "targets": [
            {
              "expr": "longhorn_volume_read_iops{pvc_namespace=\"$namespace\",pvc=\"$pvc\"}",
              "legendFormat": "Read IOPS",
              "refId": "A"
            },
            {
              "expr": "longhorn_volume_write_iops{pvc_namespace=\"$namespace\",pvc=\"$pvc\"}",
              "legendFormat": "Write IOPS",
              "refId": "B"
            }
          ],
          "title": "IOPS",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 5
          },
          "id": 6,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "targets": [
            {
              "expr": "longhorn_volume_read_throughput{pvc_namespace=\"$namespace\",pvc=\"$pvc\"}",
              "legendFormat": "Read Throughput",
              "refId": "A"
            },
            {
              "expr": "longhorn_volume_write_throughput{pvc_namespace=\"$namespace\",pvc=\"$pvc\"}",
              "legendFormat": "Write Throughput",
              "refId": "B"
            }
          ],
          "title": "Throughput",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ms"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 13
          },
          "id": 7,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "targets": [
            {
              "expr": "longhorn_volume_read_latency{pvc_namespace=\"$namespace\",pvc=\"$pvc\"} / 1000000",
              "legendFormat": "Read Latency",
              "refId": "A"
            },
            {
              "expr": "longhorn_volume_write_latency{pvc_namespace=\"$namespace\",pvc=\"$pvc\"} / 1000000",
              "legendFormat": "Write Latency",
              "refId": "B"
            }
          ],
          "title": "Latency",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 41,
      "style": "dark",
      "tags": [
        "kaspa",
        "longhorn",
        "storage"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "selected": true,
              "text": "kaspa",
              "value": "kaspa"
            },
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "definition": "label_values(longhorn_volume_capacity_bytes, pvc_namespace)",
            "label": "Namespace",
            "name": "namespace",
            "options": [],
            "query": {
              "query": "label_values(longhorn_volume_capacity_bytes, pvc_namespace)",
              "refId": "Prometheus-namespace"
            },
            "refresh": 1,
            "type": "query"
          },
          {
            "current": {
              "selected": true,
              "text": "data-prod-kaspad-0",
              "value": "data-prod-kaspad-0"
            },
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "definition": "label_values(longhorn_volume_capacity_bytes{pvc_namespace=\"$namespace\"}, pvc)",
            "label": "PVC",
            "name": "pvc",
            "options": [],
            "query": {
              "query": "label_values(longhorn_volume_capacity_bytes{pvc_namespace=\"$namespace\"}, pvc)",
              "refId": "Prometheus-pvc"
            },
            "refresh": 1,
            "type": "query"
          }
        ]
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "title": "Kaspa Longhorn Storage",
      "uid": "kaspa-longhorn-storage",
      "version": 3
    }
