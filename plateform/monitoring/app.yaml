# included by apps (app-of-apps pattern)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: kluster
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 82.13.5
      helm:
        releaseName: monitoring
        valueFiles:
          - $values/plateform/monitoring/values/kube-prometheus-stack.yaml
    - repoURL: https://github.com/K-Kluster/infrastructure.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/K-Kluster/infrastructure.git
      targetRevision: main
      path: plateform/monitoring/resources
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
